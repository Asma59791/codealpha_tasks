<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Image Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
  scroll-behavior:smooth;
}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* NAVBAR */
nav{
  position:sticky;
  top:0;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:15px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

nav h2{
  font-weight:600;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  transition:0.3s;
}

nav a:hover{
  color:#ffd369;
}

/* HEADER */
header{
  text-align:center;
  padding:60px 20px 30px;
}

header h1{
  font-size:36px;
  margin-bottom:10px;
}

header p{
  opacity:0.8;
}

/* FILTERS */
.filters{
  text-align:center;
  margin:20px 0 40px;
}

.filters button{
  padding:8px 20px;
  margin:5px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  background:white;
  color:#203a43;
  transition:0.3s;
}

.filters button:hover,
.filters button.active{
  background:#ffd369;
}

/* GALLERY */
.gallery{
  padding:0 8% 60px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.image-card{
  position:relative;
  overflow:hidden;
  border-radius:15px;
  cursor:pointer;
  transform:scale(1);
  transition:0.4s ease;
}

.image-card img{
  width:100%;
  display:block;
  transition:0.4s ease;
}

.image-card:hover img{
  transform:scale(1.1);
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  opacity:0;
  transition:0.4s ease;
}

.image-card:hover .overlay{
  opacity:1;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  animation:fadeIn 0.4s ease;
}

.lightbox img{
  max-width:80%;
  max-height:70%;
  border-radius:10px;
  margin-bottom:20px;
  animation:zoomIn 0.4s ease;
}

.lightbox button{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  background:#ffd369;
  font-weight:500;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:28px;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.3);
  font-size:14px;
  opacity:0.8;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes zoomIn{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

@media(max-width:768px){
  header h1{
    font-size:26px;
  }
}
</style>
</head>

<body>

<nav>
  <h2>Asma Gallery</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
  </div>
</nav>

<header>
  <h1>Professional Image Gallery</h1>
  <p>Responsive design with filters, animations & lightbox</p>
</header>

<div class="filters">
  <button class="active" onclick="filterImages('all', event)">All</button>
  <button onclick="filterImages('nature', event)">Nature</button>
  <button onclick="filterImages('city', event)">City</button>
</div>

<div class="gallery">

  <div class="image-card nature" onclick="openLightbox(0)">
    <img src="https://picsum.photos/id/1015/600/400">
    <div class="overlay">🔍</div>
  </div>

  <div class="image-card city" onclick="openLightbox(1)">
    <img src="https://picsum.photos/id/1011/600/400">
    <div class="overlay">🔍</div>
  </div>

  <div class="image-card nature" onclick="openLightbox(2)">
    <img src="https://picsum.photos/id/1025/600/400">
    <div class="overlay">🔍</div>
  </div>

  <div class="image-card city" onclick="openLightbox(3)">
    <img src="https://picsum.photos/id/1031/600/400">
    <div class="overlay">🔍</div>
  </div>

</div>

<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">✖</span>
  <img id="lightbox-img">
  <div>
    <button onclick="prevImage()">Previous</button>
    <button onclick="nextImage()">Next</button>
  </div>
</div>

<footer>
  © 2026 Asma Parveen | Internship Submission
</footer>

<script>
const images = [
"https://picsum.photos/id/1015/600/400",
"https://picsum.photos/id/1011/600/400",
"https://picsum.photos/id/1025/600/400",
"https://picsum.photos/id/1031/600/400"
];

let currentIndex = 0;

function openLightbox(index){
  currentIndex = index;
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src = images[currentIndex];
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}

function nextImage(){
  currentIndex = (currentIndex + 1) % images.length;
  document.getElementById("lightbox-img").src = images[currentIndex];
}

function prevImage(){
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  document.getElementById("lightbox-img").src = images[currentIndex];
}

document.addEventListener("keydown", function(e){
  if(e.key === "ArrowRight") nextImage();
  if(e.key === "ArrowLeft") prevImage();
  if(e.key === "Escape") closeLightbox();
});

function filterImages(category, event){
  const cards = document.querySelectorAll(".image-card");
  const buttons = document.querySelectorAll(".filters button");

  buttons.forEach(btn=>btn.classList.remove("active"));
  event.target.classList.add("active");

  cards.forEach(card=>{
    if(category === "all"){
      card.style.display="block";
    } else {
      card.style.display = card.classList.contains(category) ? "block" : "none";
    }
  });
}
</script>

</body>
</html>
